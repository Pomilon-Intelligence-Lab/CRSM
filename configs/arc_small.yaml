# ARC-Small Configuration (~5M Parameters)
# A viable size for learning basic ARC logic on CPU/Consumer GPU

# Model Architecture
vocab_size: 100
hidden_size: 176
num_hidden_layers: 6
intermediate_size: 704
d_state: 64
dropout: 0.1

# Reasoning Engine
injection_rate: 0.2
n_simulations: 50       # Reduced from 1000 for training speed (increase for eval)
c_puct: 1.5

# Training
lr: 3e-4                # Lower LR for larger model
epochs: 100             # Needs more time to converge
batch_size: 8           # Smaller batch size for memory
grad_accum_steps: 4     # Effective batch size = 32
seq_len: 4096           # Required for full ARC tasks

# Task Data
arc_data_path: "data/arc_sanity/identity.jsonl"
arc_eval_path: "data/arc_sanity/identity.jsonl"
